networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  database-net:
    driver: bridge

services:
  # ==================================================================
  # CADDY — Reverse Proxy + Automatic TLS
  # ==================================================================
  # Binds to host ports 80/443. All external traffic flows through Caddy.
  # Individual services no longer expose ports directly.
  # Caddy automatically obtains and renews Let's Encrypt TLS certificates.
  # ==================================================================
  caddy:
    image: caddy:2-alpine
    container_name: ai-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.env
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================================================================
  # CORE UTILITY DATA LAYER (database-net only)
  # ==================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - database-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - database-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: always
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - ./data/qdrant:/qdrant/storage
    # No direct host port — accessed via Caddy reverse proxy at qdrant.${DOMAIN}
    networks:
      - database-net
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==================================================================
  # WEB SEARCH FOR AGENTS (backend-net only)
  # ==================================================================
  searxng:
    image: searxng/searxng:latest
    container_name: ai-searxng
    restart: always
    volumes:
      - ./configs/searxng:/etc/searxng
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================================================================
  # INFERENCE ENGINE LAYER (backend-net)
  # ==================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: always
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==================================================================
  # LiteLLM GATEWAY — Cross-network bridge
  # ==================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-litellm
    restart: always
    # No direct host port — accessed via Caddy at litellm.${DOMAIN}
    env_file:
      - ./.env
      - ./.secrets
    volumes:
      - ./configs/litellm/litellm.yml:/app/config.yaml:ro
      - ./data/litellm:/app/data
    command: ["--config", "/app/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
      - database-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/routes')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==================================================================
  # FRONTEND INTERFACE (frontend-net + backend-net)
  # ==================================================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-openwebui
    restart: always
    # No direct host port — accessed via Caddy at ${DOMAIN} (root)
    environment:
      - OPENAI_API_BASE_URL=https://litellm.${DOMAIN}/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - REDIS_CONNECTION_STRING=redis://:${REDIS_PASSWORD}@ai-redis:6379/0
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=False
    volumes:
      - ./data/openwebui:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net

  # ==================================================================
  # WORKFLOW AUTOMATION (frontend-net + backend-net + database-net)
  # ==================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai-n8n
    restart: always
    # No direct host port — accessed via Caddy at n8n.${DOMAIN}
    env_file:
      - ./.env
      - ./.secrets
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=ai-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_SECURE_COOKIE=true
      - WEBHOOK_URL=https://n8n.${DOMAIN}/
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./configs/n8n:/opt/n8n/configs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
      - database-net

  # ==================================================================
  # WEB BROWSER AUTOMATION (backend-net only)
  # ==================================================================
  browserless:
    image: browserless/chrome:latest
    container_name: ai-browserless
    restart: always
    env_file:
      - ./.env
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - TOKEN=${BROWSERLESS_TOKEN}
    networks:
      - backend-net

  # ==================================================================
  # AUTONOMOUS WORKERS (backend-net only)
  # ==================================================================
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: ai-agent-zero
    restart: always
    env_file:
      - ./.env
      - ./.secrets
    volumes:
      - ./data/agent-zero:/a0/usr
      - ./configs/agent-zero:/app/config
    environment:
      - OPENAI_API_BASE=http://ai-litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - SEARXNG_URL=http://ai-searxng:8080
    depends_on:
      litellm:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - backend-net

  openclaw:
    image: alpine/openclaw:latest
    container_name: ai-openclaw
    restart: always
    ports:
      - "${OPENCLAW_PORT}:18789"
    env_file:
      - ./.env
      - ./.secrets
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./configs/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json
    command: ["node", "openclaw.mjs", "gateway", "--bind=lan", "--port=18789"]
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${LITELLM_MASTER_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_DM_POLICY=allowlist
      - TELEGRAM_ALLOW_FROM=["tg:6779511356"]
    depends_on:
      litellm:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - backend-net
