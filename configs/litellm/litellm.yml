
# Litellm Mapping 

model_list:
  # ====================================================================
  # TIER 1: SUPREME REASONING (Load Balanced & Prioritized)
  # ====================================================================
  - model_name: morpheus-core
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: "os.environ/OPENROUTER_KEY_1"
      max_tokens: 4096
    model_info:
      tier: free
      max_input_tokens: 15000

  - model_name: morpheus-core
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: "os.environ/OPENROUTER_KEY_2"
      max_tokens: 4096
    model_info:
      tier: free
      max_input_tokens: 15000

  - model_name: morpheus-deep-thought
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_KEY_1"
      max_tokens: 8192
    model_info:
      tier: free
      max_input_tokens: 32000

  - model_name: morpheus-deep-thought
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_KEY_2"
      max_tokens: 8192
    model_info:
      tier: free
      max_input_tokens: 32000

  # ====================================================================
  # TIER 2: FAST OPERATIONAL EXECUTION
  # ====================================================================
  - model_name: morpheus-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: "os.environ/GEMINI_API_KEY_1"
      max_tokens: 2048
    model_info:
      tier: free
      max_input_tokens: 15000

  - model_name: morpheus-qwen
    litellm_params:
      model: dashscope/qwen-max
      api_key: "os.environ/ALIBABA_MODELSTUDIO_KEY_1"
      max_tokens: 2048
    model_info:
      tier: free
      max_input_tokens: 32000

  - model_name: morpheus-qwen
    litellm_params:
      model: dashscope/qwen-max
      api_key: "os.environ/ALIBABA_MODELSTUDIO_KEY_2"
      max_tokens: 2048
    model_info:
      tier: free
      max_input_tokens: 32000

  # ====================================================================
  # TIER 3: OPENROUTER FREE FALLBACK POOL
  # ====================================================================
  - model_name: morpheus-free-fallback
    litellm_params:
      model: openrouter/google/gemma-4-26b-a4b-it:free
      api_key: "os.environ/OPENROUTER_KEY_1"
      max_tokens: 2048
    model_info:
      tier: free
      max_input_tokens: 15000

  - model_name: morpheus-free-fallback
    litellm_params:
      model: openrouter/google/gemma-4-26b-a4b-it:free
      api_key: "os.environ/OPENROUTER_KEY_2"
      max_tokens: 2048
    model_info:
      tier: free
      max_input_tokens: 15000

  # ====================================================================
  # TIER 4: LOCAL HARDWARE (NVIDIA GPU via Ollama)
  # ====================================================================
  - model_name: local-processor
    litellm_params:
      model: ollama/dolphin3
      api_base: http://ai-ollama:11434
      num_ctx: 8192

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ai-ollama:11434

  - model_name: dolfin3-8b-4.9-unrestricted
    litellm_params:
      model: ollama/dolphin3
      api_base: http://ai-ollama:11434

  - model_name: dolfin3-Mistral-8b-4.1-unrestricted
    litellm_params:
      model: ollama/dolphin3-mistral
      api_base: http://ai-ollama:11434

# ====================================================================
# ADVANCED PRIORITY, ROUTING, & RETRY ENGINE
# ====================================================================
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  cooldown_time: 30

  fallbacks:
    - {"morpheus-core": ["morpheus-free-fallback", "local-processor", "dolfin3-Mistral-8b-4.1-unrestricted"]}
    - {"morpheus-deep-thought": ["morpheus-free-fallback", "local-processor", "dolfin3-Mistral-8b-4.1-unrestricted"]}
    - {"morpheus-flash": ["morpheus-free-fallback", "dolfin3-Mistral-8b-4.1-unrestricted"]}
    - {"morpheus-qwen": ["morpheus-free-fallback", "dolfin3-Mistral-8b-4.1-unrestricted"]}

litellm_settings:
  drop_params: true
  set_verbose: false
