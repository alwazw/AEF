# ====================================================================
# SearXNG -- Lean Agent-Focused Configuration
# ====================================================================
# Uses default settings as base, overrides only what agents need.
# ====================================================================

use_default_settings: true

general:
  instance_name: "AI-Stack SearXNG"
  enable_metrics: false
  debug: true

search:
  safe_search: 0
  autocomplete: "google"
  autocomplete_min: 3
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "searxng-agent-secret-key-replace-in-production"
  limiter: false
  image_proxy: false
  method: "GET"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  pool_connections: 50
  pool_maxsize: 10
  enable_http2: true

ui:
  default_theme: simple
  default_locale: "en"
  search_on_category_select: true

# Disable engines that are heavy, unreliable, or unnecessary for agents
